services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: guardian
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d guardian"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - redis-data:/data

  guardian-web:
    build:
      context: ./guardian-web
      dockerfile: Dockerfile
    environment:
      BACKEND_MODE: prod
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/guardian
      REDIS_URL: redis://redis:6379
      PROD_BOOTSTRAP_SAMPLE_DATA: "true"
      PLANNER_PROVIDER: auto
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      OPENAI_WEBHOOK_SECRET: ${OPENAI_WEBHOOK_SECRET:-}
    ports:
      - "3000:3000"
    command: >
      sh -c "npm run prisma:generate &&
             npm run prisma:migrate:deploy &&
             npm run start -- -H 0.0.0.0 -p 3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  guardian-worker:
    build:
      context: ./guardian-web
      dockerfile: Dockerfile
    environment:
      BACKEND_MODE: prod
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/guardian
      REDIS_URL: redis://redis:6379
      PROD_BOOTSTRAP_SAMPLE_DATA: "true"
      PLANNER_PROVIDER: auto
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      OPENAI_WEBHOOK_SECRET: ${OPENAI_WEBHOOK_SECRET:-}
    command: >
      sh -c "npm run prisma:generate &&
             npm run prisma:migrate:deploy &&
             npm run worker"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres-data:
  redis-data:

